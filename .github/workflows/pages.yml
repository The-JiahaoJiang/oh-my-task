name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "scripts/generate_project_site.py"
      - "scripts/check_project_site.py"
      - "README.md"
      - "OH-MY-TASK.md"
      - "OH-MY-TASK.html"
      - "package.json"
      - "requirements-site.txt"
      - "skills/**"
      - "packages/pi-extension/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install site generator dependencies
        run: python -m pip install --requirement requirements-site.txt
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Generate architecture reference
        run: python scripts/generate_design_html.py
      - name: Generate site
        run: python scripts/generate_project_site.py --output _site
      - name: Validate generated site
        run: python scripts/check_project_site.py _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
